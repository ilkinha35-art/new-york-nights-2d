<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>New York Nights 2D</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    canvas {
      border: 2px solid #fff;
      background-color: #111;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <h1>New York Nights 2D</h1>
  <p>Clique nas áreas coloridas para interagir!</p>

  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="info"></div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");

    // Áreas interativas
    const areas = [
      {name: "Central Park", x:150, y:100, w:500, h:300, color:"green"},
      {name: "Times Square", x:380, y:260, w:80, h:80, color:"yellow"},
      {name: "JFK Airport", x:50, y:50, w:100, h:80, color:"lightblue"},
      {name: "LaGuardia Airport", x:600, y:100, w:100, h:80, color:"lightblue"}
    ];

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      areas.forEach(area => {
        ctx.fillStyle = area.color;
        ctx.fillRect(area.x, area.y, area.w, area.h);
        ctx.fillStyle = "white";
        ctx.fillText(area.name, area.x+10, area.y+20);
      });
    }

    // Detectar clique
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      areas.forEach(area => {
        if (mouseX >= area.x && mouseX <= area.x+area.w &&
            mouseY >= area.y && mouseY <= area.y+area.h) {
          info.innerHTML = `<p>Você clicou em <b>${area.name}</b>!</p>`;
        }
      });
    });

    draw();
  </script>
</body>
</html>
